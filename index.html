 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Idris Dörner</title>
    <style>
        :root {
            --paypal-blue: #0070ba;
            --paypal-dark: #005ea6;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --card-bg: #ffffff;
            --text-main: #2c3e50;
        }

        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
            box-sizing: border-box;
        }

        h1 {
            margin-top: 0;
            font-size: 1.75rem;
            font-weight: 700;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .pay-btn {
            display: inline-block;
            background-color: var(--paypal-blue);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0, 112, 186, 0.3);
        }

        .pay-btn:hover {
            background-color: var(--paypal-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 112, 186, 0.4);
        }

        .pay-btn:active {
            transform: translateY(1px);
        }

        .paywall-section {
            margin-top: 2.5rem;
            border-top: 2px dashed #e2e8f0;
            padding-top: 2rem;
        }

        .status-notice {
            font-size: 0.9rem;
            color: #e74c3c;
            margin-bottom: 1.5rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .status-notice.unlocked {
            color: #27ae60;
        }

        .paywall-content {
            filter: blur(5px);
            opacity: 0.4;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .paywall-content.active {
            filter: blur(0);
            opacity: 1;
            pointer-events: auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        label {
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7f8c8d;
        }

        input, textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            background: #f8fafc;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--paypal-blue);
            background: #fff;
        }

        .submit-btn {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background-color: #27ae60;
        }

        .wall-display {
            margin-top: 2rem;
            text-align: left;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            max-height: 180px;
            overflow-y: auto;
        }

        .wall-title {
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: #64748b;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .msg-item {
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .msg-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Support My Work</h1>
        <p class="subtitle">Thank you for your support! Tip 1€ to unlock the wall and leave your custom message.</p>
        
        <!-- PayPal Button -->
        <a href="https://www.paypal.com/paypalme/IdrisDorner/1EUR" 
           target="_blank" 
           id="pay-button" 
           class="pay-btn">
           spend 1€
        </a>

        <!-- Paywall Section -->
        <div class="paywall-section">
            <div id="status-text" class="status-notice">
                🔒 Content locked. Click the button above to pay and unlock.
            </div>
            
            <div id="paywall-form-container" class="paywall-content">
                <form id="wall-form">
                    <label for="username">Your Name</label>
                    <input type="text" id="username" placeholder="Anonymous" required>
                    
                    <label for="usermessage">Message (Optional)</label>
                    <textarea id="usermessage" rows="3" placeholder="Write something nice..."></textarea>
                    
                    <button type="submit" class="submit-btn">Post to Wall</button>
                </form>
            </div>

            <!-- The Wall (Visible to see previous messages) -->
            <div class="wall-display">
                <div class="wall-title">⭐ Supporter Wall</div>
                <div id="messages-container">
                    <div class="msg-item" id="empty-msg" style="color: #94a3b8; font-style: italic;">No messages yet. Be the first!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const payButton = document.getElementById('pay-button');
        const statusText = document.getElementById('status-text');
        const formContainer = document.getElementById('paywall-form-container');
        const wallForm = document.getElementById('wall-form');
        const messagesContainer = document.getElementById('messages-container');
        const emptyMsg = document.getElementById('empty-msg');

        // Funktion, die die Paywall entfernt, wenn geklickt wird
        payButton.addEventListener('click', () => {
            // Kleiner Delay, damit der User merkt, dass sich durch den Klick etwas verändert
            setTimeout(() => {
                formContainer.classList.add('active');
                statusText.innerHTML = "🔓 Thank you for your support! You can now write on the wall.";
                statusText.className = "status-notice unlocked";
            }, 1500); 
        });

        // Verarbeitung der Nachrichtenschreibung
        wallForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const name = document.getElementById('username').value.trim() || 'Anonymous';
            const message = document.getElementById('usermessage').value.trim();

            // Falls noch der "No messages yet" Text da ist, löschen
            if (emptyMsg) {
                emptyMsg.remove();
            }

            // Neue Nachricht erstellen
            const msgItem = document.createElement('div');
            msgItem.className = 'msg-item';
            
            if (message) {
                msgItem.innerHTML = `<strong>${name}</strong>: "${message}"`;
            } else {
                msgItem.innerHTML = `<strong>${name}</strong> supported with 1€!`;
            }

            // Nachricht ganz oben an die Pinnwand anheften
            messagesContainer.insertBefore(msgItem, messagesContainer.firstChild);

            // Formular zurücksetzen
            wallForm.reset();
        });
    </script>

</body>
</html>
